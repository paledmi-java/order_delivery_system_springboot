<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <style>

        body {
            margin: 0;
            background-color: #f5d9b0;
            font-family: 'Inter', sans-serif;
        }

       .container{
           display: flex;
           flex-direction: column;
           justify-content: center;  /* вертикально */
           align-items: center;      /* горизонтально */
           height: 100%;
           padding-top: 70px; /* сдвигаем вниз на 50px от верха */
       }

       .buttons{
           display: flex;
           flex-direction: column;
           align-items: center;
           gap: 10px;
       }

       .buttons button{
           width: 220px;
           font-size: 17px;
           color: black;
           background-color: #dec6a2;
           padding: 15px 30px;
           border: none;
           border-radius: 5px;
       }

        .buttons button:hover {
            background-color: #c9b18a;
            cursor: pointer;
            transition: 0.2s;
        }

    </style>
</head>
<body>

<div class="container">
<h1>Order Delivery Service</h1>
<div class="buttons">
    <form th:action="@{/app/public/menu}" th:object="${client}" method="get">
<button type="submit">Menu</button>
    </form>
<button type="button">Search an Item</button>
<button type="button">Show my basket</button>
<button type="button" th:if="${client==null}">Log in</button>
<button type="button" th:if="${client==null}">Sign up</button>

<button type="button" th:if="${client!=null}">Log out</button>
</div>
</div>

</body>
</html>
