<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://java.sun.com/JSP/Page">
<head>
    <meta charset="UTF-8">
    <title>clientHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <style>

        body {
            margin: 0;
            background-color: #f5d9b0;
            font-family: 'Inter', sans-serif;
        }

        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;  /* вертикально */
            align-items: center;      /* горизонтально */
            height: 100%;
            padding-top: 70px; /* сдвигаем вниз на 50px от верха */
        }

        .buttons{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .buttons button{
            width: 220px;
            font-size: 17px;
            color: black;
            background-color: #dec6a2;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
        }

        .buttons button:hover {
            background-color: #c9b18a;
            cursor: pointer;
            transition: 0.2s;
        }

    </style>
</head>
<body>
<!--sec:authorize="isAuthenticated()"-->
<div class="container">
    <h1>Order Delivery Service</h1>
    <div class="buttons">
        <form th:action="@{/app/public/menu}" th:object="${client}" method="get">
            <button type="submit">Menu</button>
        </form>
        <button type="button">Search an Item</button>
        <button type="button">Show my basket</button>

        <form th:action="@{/logout}" method="post">
        <button type="submit">Log out</button>
        </form>

    </div>
</div>

</body>
</html>
