<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OneItem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: #f5d9b0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .item-container {
            width: 95%;
            display: flex;               /* флекс-контейнер */
            max-width: 1000px;           /* ограничение ширины */
            margin: 20px auto;
            gap: 20px;                    /* расстояние между колонками */
            padding: 20px;
        }

        .left {
            flex: 1;                     /* картинка занимает всю левую колонку */
        }

        .left img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;         /* по желанию скругление */
        }

        .right {
            flex: 1;                     /* правая колонка с текстом */
            display: flex;
            flex-direction: column;      /* элементы сверху вниз */
            justify-content: flex-start;
            align-items: flex-start;     /* выравнивание текста по левому краю */
        }

        .right h1, .right h3, .right p {
            margin: 5px 0;               /* небольшие отступы между абзацами и заголовками */
        }

        .right form {
            margin-top: 15px;            /* кнопка под текстом */
        }

        .right button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #f08a5d;
            border: none;
            color: white;
            border-radius: 5px;
        }

    </style>
</head>
<body>
<div class="item-container">

    <div class="left">
    <img th:src="${item.imageUrl}" th:alt="${item.itemName}"/>
    </div>

    <div class="right">
        <h1 th:text="${item.itemName}"></h1>
        <h3>Description: </h3>
        <p th:text="${item.description}"></p>
        <h3>Ingredients: </h3>
        <p th:text="${item.ingredients}"></p>
        <h3>Mass: </h3>
        <p th:text="${item.mass} + ' gram'"></p>
        <h3>Сalories: </h3>
        <p th:text="${item.kcal} + ' kcal'"></p>
        <h3>Price: </h3>
        <p th:text="${item.price} + ' rub'"></p>

        <form th:action="@{/app/user/putItemInBasket}" th:object="${item}" method="post" onsubmit="showAdded(event)">
            <input type="hidden" th:name="itemId" th:value="${item.itemId}">
            <button type="submit">Add to Cart</button>
            <span id="added-message" style="display:none; color: green; margin-left: 10px;">✓ Added</span>
        </form>

        <script>
            function showAdded(event) {
                event.preventDefault(); // чтобы не уходить со страницы
                const form = event.target;
                const addedMsg = document.getElementById('added-message');

                fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form)
                }).then(response => {
                    if(response.ok){
                        addedMsg.style.display = 'inline'; // показываем
                        setTimeout(() => {
                            addedMsg.style.display = 'none'; // скрываем через 2 секунды
                        }, 2000);
                    }
                });
            }
        </script>
    </div>
</div>
</body>
</html>
