<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: #f5d9b0;
            font-family: 'Inter', sans-serif;
        }

        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 70px;
        }

        button{
            width: 180px;
            font-size: 17px;
            color: black;
            background-color: #dec6a2;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
        }

        input{
            width: 250px;
            font-size: 17px;
            color: black;
            background-color: #dec6a2;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
        }

        input:focus{
            outline: none;
        }

        .elements{
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>
<body>

<div class="container">
<h1>Log in</h1>

    <div class="elements">
<form th:action="@{/login}" method="post">
    <input type="text" name="username" placeholder="Login">
    <input type="password" name="password" placeholder="Password">
    <button type="submit">Login</button>

    <div th:if="${param.error == 'bad_credentials'}" style="color: red">
        Wrong login or password
    </div>
</form>
    <button onclick="location.href='/'">Back</button>
    </div>

</div>

</body>
</html>
