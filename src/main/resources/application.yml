spring:
  application:
    name: order_delivery_system_springboot

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/order_system_spring_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456qwertyasdfgh}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    user: root
    password: root
    clean-disabled: false

  jpa:
    hibernate:
      ddl-auto: validate # create / update / validate / none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

management:
    endpoints:
      web:
        exposure:
          include: health, info, metrics

logging:
    level:
      org.springframework.security: trace
      root: INFO
      org.springframework: WARN
      org.hibernate.SQL: DEBUG

security:
  jwt:
    secret: "B5/wuDRUFYtV7mfWqgV3gTjCyQ9eA7wlFvuNGgxmiYs="
    access-token-expiration-ms: 86400000
    refresh-token-expiration-ms: 604800000

server:
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      protocol-header: X-Forwarded-Proto
      remote-ip-header: X-Forwarded-For
