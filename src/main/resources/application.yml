spring:
  application:
    name: order_delivery_system_springboot

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  datasource:
    url: jdbc:mysql://localhost:3306/order_system_spring_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456qwertyasdfgh
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    user: root
    password: 123456qwertyasdfgh
    clean-disabled: false

  jpa:
    hibernate:
      ddl-auto: validate # create / update / validate / none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

management:
    endpoints:
      web:
        exposure:
          include: health, info, metrics

logging:
    level:
      org.springframework.security: trace

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 86400000
    refresh-token-expiration-ms: 604800000
