spring:
  application:
    name: order_delivery_system_springboot

  datasource:
    url: jdbc:mysql://localhost:3306/order_system_spring_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456qwertyasdfgh
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # create / update / validate / none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  management:
    endpoints:
      web:
        exposure:
          include: health, info, metrics